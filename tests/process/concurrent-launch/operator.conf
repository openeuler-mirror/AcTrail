# AcTrail operator configuration.

[control]
socket_path = "/tmp/actrail-concurrent-launch.sock"
socket_mode_octal = "660"
pending_connection_max = 256
active_trace_max = 100
pid_file = "/tmp/actrail-concurrent-launch.pid"
log_path = "/tmp/actrail-concurrent-launch.log"
diagnostic_log_level = "info"

[control.workload_diagnostics]
enabled = false
interval_ms = 1000

[control.finalization]

[storage]
backend = "sqlite"

[storage.sqlite]
path = "/tmp/actrail-concurrent-launch.sqlite"
busy_timeout_ms = 5000

[web]
listen_addr = "127.0.0.1:18080"
request_read_timeout_ms = "1000"

[export.snapshot]
graph_schema_version = "manual-v1"
allow_active_trace_snapshot = true
directory = "/tmp/actrail-concurrent-launch-export"
payload_bytes_enabled = false
payload_text_enabled = false

[export.runtime]
enabled = false

[[export.runtime.routes]]
name = "live-otel"
kind = "otel-jsonl"
delivery = "best-effort"
enabled = false

[export.runtime.routes.otel_jsonl]
path = "/tmp/actrail-concurrent-launch-live-spans.otlp.jsonl"
overwrite_enabled = false
queue_capacity = 128
flush_every_spans = 1

[capture]
profile_name = "concurrent-launch-e2e"
capabilities = [
  "proc-lifecycle",
  "stdio-chunk",
]

[ebpf]
enabled = true
memlock_rlimit = "inherit"
tracked_process_max_entries = 1024
pending_operation_max_entries = 1024
suppressed_fd_max_entries = 1024
suppressed_fd_index_slots_per_process = 64
event_ring_buffer_max_bytes = 1048576
file_path_capture_enabled = false
file_path_max_bytes = 255

[payload.tls]
enabled = false
capture_backend = "tls-sync"
source = "auto"
resolver = "auto"
library = "auto"
library_path = "auto"
binary_path = "disabled"
pattern_path = "disabled"
max_segment_bytes = 4095
max_operation_bytes = 4194304
ring_buffer_bytes = 1048576
pending_operation_max_entries = 1024
diagnostics_enabled = false
retention_max_bytes_per_trace = 1048576
redaction_policy = "disabled"
sync_runtime_library_path = "auto"
sync_event_socket_path = "/tmp/actrail-concurrent-launch-tls-sync.sock"
sync_socket_mode_octal = "660"
sync_match_limit = 8
java_agent_enabled = false
seccomp_syscalls = ["write", "writev", "sendto", "sendmsg"]

[payload.stdio]
enabled = true
capture_stdin = false
capture_stdout = true
capture_stderr = true
stdin_storage_mode = "metadata-only"
stdout_storage_mode = "full"
stderr_storage_mode = "full"
max_segment_bytes = 4095
ring_buffer_bytes = 1048576
pending_operation_max_entries = 1024
stream_state_max_entries = 1024
retention_max_bytes_per_trace = 1048576
redaction_policy = "disabled"

[payload.socket]
enabled = false
capture_backend = "bpf-copy-seccomp-fallback"
max_segment_bytes = 4095
max_operation_bytes = 4194304
ring_buffer_bytes = 1048576
pending_operation_max_entries = 1024
stream_state_max_entries = 1024
retention_max_bytes_per_trace = 1048576
redaction_policy = "disabled"
http_sniff_max_bytes = 8192
seccomp_syscalls = ["write", "writev", "sendto", "sendmsg"]

[seccomp_notify]
enabled = false
reserved_listener_fd = 253

[process_seccomp]
enabled = false
syscalls = ["execve", "execveat", "fork", "vfork", "clone", "clone3"]
max_args = 64
max_arg_bytes = 4096
pending_max_entries = 1024

[agent_invocation]
enabled = false

[semantic_retention]
content_owner = "highest_consumed"

[semantic_retention.l0_llm_call]
enabled = false
request_content = "none"
response_content = "none"
tool_calls = "none"
usage = "none"

[semantic_retention.l1_sse]
enabled = false
stream_summary = false
event_content = "none"

[semantic_retention.l2_http]
enabled = false
message_summary = false
headers = "none"
body_content = "none"

[semantic_retention.l3_http2_frame]
enabled = false
frame_summary = false
data_content = "none"

[semantic_retention.l4_payload]
enabled = true
stats = true
body_content = "none"

[file_observation]
enabled = false
metadata_retention = "compact"

[file_observation.tty]
enabled = false
raw_event_retention = "errors_only"
paths = ["/dev/tty"]
operations = ["open"]

[file_observation.bulk_read]
enabled = false
mode = "path_set"
raw_event_retention = "errors_only"
min_unique_paths = 16
max_paths_per_set = 4096
path_set_chunk_max_paths = 256
pending_event_max = 256

[file_observation.enumerate]
enabled = false
raw_event_retention = "errors_only"
min_unique_paths = 2
max_paths_per_set = 4096
path_set_chunk_max_paths = 256

[application]
enabled = false
http1_enabled = false
http2_enabled = false

[application.http]
capture_host = false
sse_enabled = false
sse_data_policy = "disabled"
sse_max_buffer_bytes = 1048576
sse_max_data_bytes = 4096

[application.http2]
max_frame_bytes = 16384
max_connection_buffer_bytes = 1048576
emit_data_preview = false
max_data_preview_bytes = 4096

[resource_metrics]
enabled = false
interval_ms = 1000
include_children = true
include_system = false
cpu_alert_percent_millis = "disabled"
memory_alert_rss_kb = "disabled"

[provider]
rules_enabled = false
rules_path = "/tmp/actrail-concurrent-launch-provider-rules.conf"
unknown_provider_label = "unknown"

[enforcement]
enabled = false
backend = "fanotify"
scope = "trace"
rules_path = "/tmp/actrail-concurrent-launch-enforcement-rules.conf"
default_decision = "allow"
mark_strategy = "parent-directories"
audit_enabled = true
event_buffer_bytes = 65536

[supervision]
startup_wait_ms = 5000
shutdown_wait_ms = 5000
poll_interval_ms = 100
