# AcTrail concurrent launch E2E operator configuration.

socket_path = /tmp/actrail-concurrent-launch.sock
socket_mode_octal = 660
control_pending_connection_max = 256
active_trace_max = 100
pid_file = /tmp/actrail-concurrent-launch.pid
storage_backend = sqlite
storage_sqlite_path = /tmp/actrail-concurrent-launch.sqlite
storage_sqlite_busy_timeout_ms = 5000
web_listen_addr = 127.0.0.1:18080
web_request_read_timeout_ms = 1000
export_directory = /tmp/actrail-concurrent-launch-export
log_path = /tmp/actrail-concurrent-launch.log
diagnostic_log_level = info
workload_diagnostics_enabled = false
workload_diagnostics_interval_ms = 1000

graph_schema_version = manual-v1
allow_active_trace_snapshot = true
export_payload_bytes_enabled = false
export_payload_text_enabled = false

profile_name = concurrent-launch-e2e
required_capability = proc-lifecycle
required_capability = stdio-chunk

ebpf_enabled = true
memlock_rlimit = inherit
tracked_process_max_entries = 1024
pending_operation_max_entries = 1024
suppressed_fd_max_entries = 1024
suppressed_fd_index_slots_per_process = 64
event_ring_buffer_max_bytes = 1048576
file_path_capture_enabled = false
file_path_max_bytes = 255

payload_tls_enabled = false
payload_tls_capture_backend = tls-sync
payload_tls_source = auto
payload_tls_resolver = auto
payload_tls_library = auto
payload_tls_library_path = auto
payload_tls_binary_path = disabled
payload_tls_pattern_path = disabled
payload_tls_max_segment_bytes = 4095
payload_tls_max_operation_bytes = 4194304
payload_tls_ring_buffer_bytes = 1048576
payload_tls_pending_operation_max_entries = 1024
payload_tls_seccomp_syscall = write
payload_tls_seccomp_syscall = writev
payload_tls_seccomp_syscall = sendto
payload_tls_seccomp_syscall = sendmsg
payload_tls_diagnostics_enabled = false
payload_tls_retention_max_bytes_per_trace = 1048576
payload_tls_redaction_policy = disabled
payload_tls_sync_runtime_library_path = auto
payload_tls_sync_event_socket_path = /tmp/actrail-concurrent-launch-tls-sync.sock
payload_tls_sync_socket_mode_octal = 660
payload_tls_sync_match_limit = 8
payload_tls_java_agent_enabled = false

seccomp_notify_enabled = false
seccomp_notify_reserved_listener_fd = 253

process_seccomp_enabled = false
process_seccomp_syscall = execve
process_seccomp_syscall = execveat
process_seccomp_syscall = fork
process_seccomp_syscall = vfork
process_seccomp_syscall = clone
process_seccomp_syscall = clone3
process_seccomp_max_args = 64
process_seccomp_max_arg_bytes = 4096
process_seccomp_pending_max_entries = 1024

agent_invocation_enabled = false

payload_stdio_enabled = true
payload_stdio_capture_stdin = false
payload_stdio_capture_stdout = true
payload_stdio_capture_stderr = true
payload_stdio_stdin_storage_mode = metadata-only
payload_stdio_stdout_storage_mode = full
payload_stdio_stderr_storage_mode = full
payload_stdio_max_segment_bytes = 4095
payload_stdio_ring_buffer_bytes = 1048576
payload_stdio_pending_operation_max_entries = 1024
payload_stdio_stream_state_max_entries = 1024
payload_stdio_retention_max_bytes_per_trace = 1048576
payload_stdio_redaction_policy = disabled

payload_socket_enabled = false
payload_socket_capture_backend = bpf-copy-seccomp-fallback
payload_socket_max_segment_bytes = 4095
payload_socket_max_operation_bytes = 4194304
payload_socket_ring_buffer_bytes = 1048576
payload_socket_pending_operation_max_entries = 1024
payload_socket_stream_state_max_entries = 1024
payload_socket_retention_max_bytes_per_trace = 1048576
payload_socket_redaction_policy = disabled
payload_socket_http_sniff_max_bytes = 8192
payload_socket_seccomp_syscall = write
payload_socket_seccomp_syscall = writev
payload_socket_seccomp_syscall = sendto
payload_socket_seccomp_syscall = sendmsg

application_protocol_enabled = false
application_protocol_http1_enabled = false
application_protocol_http2_enabled = false
application_http_capture_host = false
application_http_sse_enabled = false
application_http_sse_data_policy = disabled
application_http_sse_max_buffer_bytes = 1048576
application_http_sse_max_data_bytes = 4096
application_http2_max_frame_bytes = 16384
application_http2_max_connection_buffer_bytes = 1048576
application_http2_emit_data_preview = false
application_http2_max_data_preview_bytes = 4096

resource_metrics_enabled = false
resource_metrics_interval_ms = 1000
resource_metrics_include_children = true
resource_metrics_include_system = false
resource_metrics_cpu_alert_percent_millis = disabled
resource_metrics_memory_alert_rss_kb = disabled

provider_rules_enabled = false
provider_rules_path = /tmp/actrail-concurrent-launch-provider-rules.conf
provider_unknown_provider_label = unknown

enforcement_enabled = false
enforcement_backend = fanotify
enforcement_scope = trace
enforcement_rules_path = /tmp/actrail-concurrent-launch-enforcement-rules.conf
enforcement_default_decision = allow
enforcement_mark_strategy = parent-directories
enforcement_audit_enabled = true
enforcement_event_buffer_bytes = 65536

startup_wait_ms = 5000
shutdown_wait_ms = 5000
supervision_poll_interval_ms = 100

[semantic_retention]
content_owner = highest_consumed

[semantic_retention.L0_llm_call]
enabled = false
request_content = none
response_content = none
tool_calls = none
usage = none

[semantic_retention.L1_sse]
enabled = false
stream_summary = false
event_content = none

[semantic_retention.L2_http]
enabled = false
message_summary = false
headers = none
body_content = none

[semantic_retention.L3_http2_frame]
enabled = false
frame_summary = false
data_content = none

[semantic_retention.L4_payload]
enabled = true
stats = true
body_content = none

[file_observation]
enabled = false
metadata_retention = compact

[file_observation.tty]
enabled = false
path = /dev/tty
operation = open
raw_event_retention = errors_only

[file_observation.bulk_read]
enabled = false
mode = path_set
raw_event_retention = errors_only
min_unique_paths = 16
max_paths_per_set = 4096
path_set_chunk_max_paths = 256
pending_event_max = 256

[file_observation.enumerate]
enabled = false
raw_event_retention = errors_only
min_unique_paths = 2
max_paths_per_set = 4096
path_set_chunk_max_paths = 256

[export]
enabled = false

[[export.routes]]
name = "live-otel"
kind = "otel-jsonl"
delivery = "best-effort"
enabled = false

[export.routes.otel-jsonl.live-otel]
path = "/tmp/actrail-concurrent-launch-live-spans.otlp.jsonl"
overwrite_enabled = false
queue_capacity = 128
flush_every_spans = 1
