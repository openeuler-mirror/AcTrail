# AcTrail multi-container real-agent E2E template.
# run_e2e.py replaces @RUNTIME_DIR@ with an isolated absolute directory.

[control]
socket_path = "@RUNTIME_DIR@/run/control.sock"
socket_mode_octal = "660"
pending_connection_max = 64
active_trace_max = 8
pid_file = "@RUNTIME_DIR@/run/actraild.pid"
log_path = "@RUNTIME_DIR@/log/actraild.log"
diagnostic_log_level = "info"

[storage]
backend = "sqlite"

[storage.sqlite]
path = "@RUNTIME_DIR@/data/actrail.sqlite"
busy_timeout_ms = 5000

[export.snapshot]
directory = "@RUNTIME_DIR@/data/export"
payload_bytes_enabled = false
payload_text_enabled = false

[export.runtime]
enabled = false

[capture]
profile_name = "multi-container-xiaoo"
capabilities = [
    "proc-lifecycle",
    "net-transport",
    "fs-access-basic",
    "socket-plaintext-payload",
    "tls-plaintext-payload",
    "net-application-plaintext-http",
]

[ebpf]
enabled = true
memlock_rlimit = "inherit"
tracked_process_max_entries = 4096
pending_operation_max_entries = 4096
suppressed_fd_max_entries = 4096
suppressed_fd_index_slots_per_process = 64
event_ring_buffer_max_bytes = 8388608
file_path_capture_enabled = true
file_path_max_bytes = 255

[payload.tls]
enabled = true
capture_backend = "tls-sync"
source = "auto"
resolver = "auto"
library = "auto"
library_path = "auto"
binary_path = "disabled"
pattern_path = "disabled"
max_segment_bytes = 4095
max_operation_bytes = 4194304
ring_buffer_bytes = 1048576
pending_operation_max_entries = 4096
diagnostics_enabled = false
retention_max_bytes_per_trace = 10485760
redaction_policy = "authorization-header"
sync_runtime_library_path = "/usr/local/bin/libactrail_tls_payload_probe_sync.so"
sync_event_socket_path = "@RUNTIME_DIR@/run/tls-sync.sock"
sync_socket_mode_octal = "660"
sync_match_limit = 8
java_agent_enabled = false
seccomp_syscalls = ["write", "writev", "sendto", "sendmsg"]

[payload.stdio]
enabled = false
capture_stdin = false
capture_stdout = false
capture_stderr = false
stdin_storage_mode = "drop"
stdout_storage_mode = "drop"
stderr_storage_mode = "drop"
max_segment_bytes = 4095
ring_buffer_bytes = 1048576
pending_operation_max_entries = 4096
stream_state_max_entries = 4096
retention_max_bytes_per_trace = 1048576
redaction_policy = "authorization-header"

[payload.socket]
enabled = true
capture_backend = "bpf-copy-seccomp-fallback"
max_segment_bytes = 4095
max_operation_bytes = 4194304
ring_buffer_bytes = 2097152
pending_operation_max_entries = 4096
stream_state_max_entries = 4096
retention_max_bytes_per_trace = 10485760
redaction_policy = "authorization-header"
http_sniff_max_bytes = 8192
seccomp_syscalls = ["write", "writev", "sendto", "sendmsg"]

[seccomp_notify]
enabled = true
reserved_listener_fd = 253

[process_seccomp]
enabled = false
syscalls = ["execve", "execveat", "fork", "vfork", "clone", "clone3"]
max_args = 64
max_arg_bytes = 4096
pending_max_entries = 4096

[agent_invocation]
enabled = false

[file_observation]
enabled = true
metadata_retention = "compact"

[file_observation.tty]
enabled = false

[file_observation.bulk_read]
enabled = false

[file_observation.enumerate]
enabled = false

[application]
enabled = true
http1_enabled = true
http2_enabled = false

[application.http]
capture_host = false
sse_enabled = true
sse_data_policy = "preview"
sse_max_buffer_bytes = 4194304
sse_max_data_bytes = 65536

[resource_metrics]
enabled = false
interval_ms = 1000
include_children = true
include_system = true
cpu_alert_percent_millis = "disabled"
memory_alert_rss_kb = "disabled"

[provider]
rules_enabled = false
unknown_provider_label = "unknown"

[enforcement]
enabled = false

[supervision]
startup_wait_ms = 10000
shutdown_wait_ms = 5000
poll_interval_ms = 100
