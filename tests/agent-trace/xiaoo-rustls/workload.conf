rustls_probe_provider = rustls
rustls_probe_source = auto
rustls_probe_match_limit = 8
xiaoo_binary = xiaoo
availability_prompt = 请只输出 ACTRAIL_XIAOO_AVAILABLE_OK
availability_marker = ACTRAIL_XIAOO_AVAILABLE_OK
availability_timeout_seconds = 90
availability_max_turns = 1
prompt = 请只输出 ACTRAIL_XIAOO_RUSTLS_OK
expected_output_fragment = ACTRAIL_XIAOO_RUSTLS_OK
daemon_ready_timeout_seconds = 10
launch_timeout_seconds = 180
drain_attempts = 20
drain_sleep_seconds = 0.5
payload_head = 80
otel_output_path = /tmp/actrail-agent-xiaoo-rustls.otlp.json
daemon_stop_timeout_seconds = 5
evidence_text_max_chars = 1200
