prompt = Reply exactly ACTRAIL_NETTY_TCNATIVE_OK
expected_output_fragment = ACTRAIL_NETTY_TCNATIVE_COMPLETE
model = deepseek-chat
api_url = https://api.deepseek.com/chat/completions
api_key_env = DEEPSEEK_API_KEY
aggregation_max_bytes = 1048576
connect_timeout_ms = 15000
event_loop_threads = 1
default_https_port = 443
http_error_status_floor = 500
daemon_ready_timeout_seconds = 10
launch_timeout_seconds = 180
drain_attempts = 20
drain_sleep_seconds = 0.5
payload_head = 80
otel_output_path = /tmp/actrail-agent-java-netty-tcnative.otlp.json
daemon_stop_timeout_seconds = 5
evidence_text_max_chars = 1200
maven_build_timeout_seconds = 180
