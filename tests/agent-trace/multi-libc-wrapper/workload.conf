build_dir = target/agent-trace/multi-libc-wrapper
daemon_ready_timeout_seconds = 5
daemon_stop_timeout_seconds = 5
launch_timeout_seconds = 20
drain_attempts = 40
drain_sleep_seconds = 0.1
payload = ACTRAIL_MULTI_LIBC_MUSL_PAYLOAD
payload_head = 80
reply = ACTRAIL_MULTI_LIBC_MUSL_RESPONSE
post_payload_sleep_ms = 150
musl_runtime_dir = /var/tmp/actrail-multi-libc-wrapper/musl-lib
control_socket_path = /tmp/actrail-agent-multi-libc-wrapper.sock
control_pid_file = /tmp/actrail-agent-multi-libc-wrapper.pid
control_log_path = /tmp/actrail-agent-multi-libc-wrapper.log
storage_sqlite_path = /tmp/actrail-agent-multi-libc-wrapper.sqlite
web_listen_addr = 127.0.0.1:18111
export_directory = /tmp/actrail-agent-multi-libc-wrapper-export
export_otel_jsonl_path = /tmp/actrail-agent-multi-libc-wrapper-live-spans.otlp.jsonl
capture_profile_name = agent-multi-libc-wrapper
payload_tls_sync_event_socket_path = /tmp/actrail-agent-multi-libc-wrapper-sync.sock
agent_invocation_commands = ["multi-libc-wrapper"]
enforcement_rules_path = /tmp/actrail-agent-multi-libc-wrapper-enforcement.conf
