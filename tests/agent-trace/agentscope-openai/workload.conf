# AgentScope native OpenAI-compatible plain HTTP E2E settings.

runtime_dir = target/agent-trace/agentscope-openai
model = actrail-agentscope-local
prompt = Please reply with exactly ACTRAIL_AGENTSCOPE_OPENAI_OK and no extra text.
expected_output_fragment = ACTRAIL_AGENTSCOPE_OPENAI_OK
request_timeout_seconds = 60
max_tokens = 128
context_size = 4096

local_api_key_env = ACTRAIL_AGENTSCOPE_OPENAI_API_KEY
local_api_key_value = actrail-local-agentscope-key

proxy_bind_host = 127.0.0.1
proxy_bind_port = 0
proxy_mode = local-stream
proxy_ready_timeout_seconds = 10
proxy_stop_timeout_seconds = 5
proxy_request_timeout_seconds = 120
proxy_read_chunk_bytes = 1024
proxy_response_chunk_delay_seconds = 0.02
local_stream_response_text = ACTRAIL_AGENTSCOPE_OPENAI_OK
upstream_base_url = https://api.deepseek.com
upstream_api_key_env = DEEPSEEK_API_KEY
upstream_auth_header_name = Authorization
upstream_auth_scheme = Bearer
expected_path_fragment = /v1/chat/completions

daemon_ready_timeout_seconds = 10
daemon_stop_timeout_seconds = 5
launch_timeout_seconds = 180
regression_timeout_seconds = 240
drain_attempts = 30
drain_sleep_seconds = 0.5
payload_head = 120
otel_output_path = target/agent-trace/agentscope-openai/agentscope-openai.otlp.json
evidence_text_max_chars = 1200
