needed_openssl_reply = ACTRAIL_DYNAMIC_TLS_NEEDED_OPENSSL_RESPONSE
dlsym_openssl_payload = ACTRAIL_DYNAMIC_TLS_DLSYM_OPENSSL_REQUEST
dlsym_openssl_reply = ACTRAIL_DYNAMIC_TLS_DLSYM_OPENSSL_RESPONSE
needed_boringssl_payload = ACTRAIL_DYNAMIC_TLS_NEEDED_BORINGSSL_REQUEST
needed_boringssl_reply = ACTRAIL_DYNAMIC_TLS_NEEDED_BORINGSSL_RESPONSE
