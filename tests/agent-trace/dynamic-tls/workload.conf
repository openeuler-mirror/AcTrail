build_dir = target/agent-trace/dynamic-tls
daemon_ready_timeout_seconds = 10
daemon_stop_timeout_seconds = 5
launch_timeout_seconds = 30
drain_attempts = 30
drain_sleep_seconds = 0.5
payload_head = 80
payload_fetch_limit = 16
# The synthetic TLS programs finish in milliseconds. Keep the process alive
# briefly after SSL_read/SSL_write so the daemon can resolve the process for
# runtime-emitted TLS sync events before /proc state disappears.
post_payload_sleep_ms = 200
needed_openssl_payload = ACTRAIL_DYNAMIC_TLS_NEEDED_OPENSSL_REQUEST
needed_openssl_reply = ACTRAIL_DYNAMIC_TLS_NEEDED_OPENSSL_RESPONSE
dlsym_openssl_payload = ACTRAIL_DYNAMIC_TLS_DLSYM_OPENSSL_REQUEST
dlsym_openssl_reply = ACTRAIL_DYNAMIC_TLS_DLSYM_OPENSSL_RESPONSE
