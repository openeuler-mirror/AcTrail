# xiaoO plain HTTP provider route E2E settings.

runtime_dir = target/agent-trace/xiaoo-http-proxy
xiaoo_config_path = target/agent-trace/xiaoo-http-proxy/xiaoo-config.toml
xiaoo_binary = xiaoo
xiaoo_provider = deepseek
model = deepseek-chat
prompt = 请只输出 ACTRAIL_XIAOO_HTTP_PROXY_OK，不要解释
expected_output_fragment = ACTRAIL_XIAOO_HTTP_PROXY_OK
max_turns = 1
max_tokens = 128
context_window = 32768

local_api_key_env = ACTRAIL_XIAOO_HTTP_PROXY_API_KEY
local_api_key_value = actrail-local-proxy-key

proxy_bind_host = 127.0.0.1
proxy_bind_port = 0
proxy_ready_timeout_seconds = 10
proxy_stop_timeout_seconds = 5
proxy_request_timeout_seconds = 120
proxy_read_chunk_bytes = 1024
proxy_response_chunk_delay_seconds = 0.02
upstream_base_url = https://api.deepseek.com
upstream_api_key_env = DEEPSEEK_API_KEY
upstream_auth_header_name = Authorization
upstream_auth_scheme = Bearer
expected_path_fragment = /chat/completions

daemon_ready_timeout_seconds = 10
daemon_stop_timeout_seconds = 5
launch_timeout_seconds = 180
regression_timeout_seconds = 240
drain_attempts = 30
drain_sleep_seconds = 0.5
payload_head = 120
otel_output_path = target/agent-trace/xiaoo-http-proxy/xiaoo-http-proxy.otlp.json
evidence_text_max_chars = 1200
