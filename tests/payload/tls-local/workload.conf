bind_host = 127.0.0.1
listen_port = 0
listen_backlog = 1
socket_timeout_seconds = 5
child_timeout_seconds = 10
post_workload_hold_seconds = 1
cert_directory = /tmp/actrail-local-payload-cert
cert_key_algorithm = rsa:2048
cert_subject = /CN=actrail-local-payload
cert_valid_days = 1
request_path = /v1/chat/completions
request_body = {"model":"actrail-local","messages":[{"role":"user","content":"payload capture"}]}
authorization_header = Bearer actrail-local-secret
response_body = {"ok":true,"source":"actrail-local"}
