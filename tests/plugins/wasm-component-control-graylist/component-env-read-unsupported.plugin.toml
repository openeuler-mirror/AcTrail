[general]
id = "wasm.component-file-graylist-env-read-unsupported"
api_version = "actrail.plugin.v2"
role = "control-decider"
runtime = "wasm"

[host]
capabilities = ["env-read"]

[runtime.wasm]
artifact_path = "component-allow.wasm"
abi = "wit-component"

[runtime.wasm.resources]
fuel_per_call = 1000000
memory_max_bytes = 2097152

[role.control-decider.resources]
concurrency_limit = 1

[plugin_config]
format = "toml"
schema_ref = ""
required = false
