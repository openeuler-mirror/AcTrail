[general]
id = "wasm.component-payload-read"
api_version = "actrail.plugin.v1"
role = "observation-consumer"
runtime = "wasm"

[host]
capabilities = ["payload-read"]

[runtime.wasm]
artifact_path = "component-payload-read.wasm"
abi = "wit-component"

[hostcall_limits.payload]
segment_max_count = 8
ref_max_bytes = 128
read_max_bytes = 64

[plugin_config]
format = "toml"
schema_ref = ""
required = false
