# Local HTTP LLM-shaped projection E2E settings.

daemon_ready_timeout_seconds = 10
daemon_stop_timeout_seconds = 5
launch_timeout_seconds = 30
drain_attempts = 20
drain_sleep_seconds = 0.25
payload_head = 40
otel_output_path = /tmp/actrail-http-llm-local.otlp.json
evidence_text_max_chars = 1200

model = actrail-local-model
marker = ACTRAIL_HTTP_LLM
path = /chat/completions
bind_host = 127.0.0.1
bind_port = 0
response_text = ok
workload_timeout_seconds = 5
request_write_mode = single-syscall
host_header = local.actrail
content_type = application/json
response_read_chunk_bytes = 4096
request_padding_bytes = 120000
