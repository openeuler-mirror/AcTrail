[general]
id = "wasm.component-control-hostcalls"
api_version = "actrail.plugin.v2"
role = "control-decider"
runtime = "wasm"

[host]
capabilities = ["context-query", "file-access.current-match-get", "file-policy.rules.read", "file-policy.rules.match-dry-run", "file-policy.rules.apply"]

[runtime.wasm]
artifact_path = "component-hostcalls.wasm"
abi = "wit-component"

[runtime.wasm.resources]
fuel_per_call = 1000000
memory_max_bytes = 2097152

[role.control-decider.resources]
concurrency_limit = 1

[hostcall_limits.context]
read_max_bytes = 1024

[hostcall_limits.file_policy]
read_max_bytes = 1024

[plugin_config]
format = "toml"
schema_ref = ""
required = false
