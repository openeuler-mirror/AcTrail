[general]
id = "wasm.file-policy-dynamic"
api_version = "actrail.plugin.v1"
role = "control-decider"
runtime = "wasm"

[host]
capabilities = ["file-policy.rules.read", "file-policy.rules.match-dry-run", "file-policy.rules.apply"]

[runtime.wasm]
artifact_path = "component-file-policy-dynamic.wasm"
abi = "wit-component"

[runtime.wasm.resources]
fuel_per_call = 2000000
memory_max_bytes = 2097152

[role.control-decider.resources]
concurrency_limit = 1

[hostcall_limits.file_policy]
read_max_bytes = 8192

[hostcall_limits.plugin_command]
argv_max_count = 16
arg_max_bytes = 4096
output_max_bytes = 65536
timeout_ms = 30000

[plugin_config]
format = "toml"
schema_ref = ""
required = false
