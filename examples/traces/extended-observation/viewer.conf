# AcTrail rich example-trace viewer/export configuration.
# Use this with actrailviewer against the storage generated by generation.conf.

[control]
socket_path = "/tmp/actrail-example-trace-path-retry.sock"
socket_mode_octal = "660"
pid_file = "/tmp/actrail-example-trace-path-retry.pid"
log_path = "/tmp/actrail-example-trace-path-retry.log"
diagnostic_log_level = "info"

[storage]
backend = "sqlite"

[storage.sqlite]
path = "/tmp/actrail-example-trace-path-retry.sqlite"
busy_timeout_ms = 5000

[web]
listen_addr = "127.0.0.1:18080"
request_read_timeout_ms = "1000"

[export.snapshot]
graph_schema_version = "example-trace-v1"
allow_active_trace_snapshot = true
directory = "/tmp/actrail-example-trace-path-retry-export"
payload_bytes_enabled = false
payload_text_enabled = false

[export.runtime]
enabled = false

[capture]
profile_name = "actrail-example-trace"
capabilities = [
  "proc-lifecycle",
  "net-transport",
  "fs-access-basic",
  "fs-mmap",
  "ipc-unix-socket",
  "ipc-pipe-fifo",
  "stdio-chunk",
  "resource-metrics",
]

[ebpf]
enabled = true
memlock_rlimit = "inherit"
tracked_process_max_entries = 4096
pending_operation_max_entries = 4096
suppressed_fd_max_entries = 4096
suppressed_fd_index_slots_per_process = 64
event_ring_buffer_max_bytes = 524288
file_path_capture_enabled = true
file_path_max_bytes = 255

[payload.tls]
enabled = false
capture_backend = "tls-sync"
source = "shared-library"
resolver = "openssl-symbols"
library = "openssl"
library_path = "auto"
binary_path = "disabled"
pattern_path = "disabled"
max_segment_bytes = 4095
max_operation_bytes = 4194304
ring_buffer_bytes = 524288
pending_operation_max_entries = 4096
seccomp_syscalls = ["write", "writev", "sendto", "sendmsg"]
retention_max_bytes_per_trace = 1048576
redaction_policy = "authorization-header"

[payload.stdio]
enabled = true
capture_stdin = true
capture_stdout = true
capture_stderr = true
max_segment_bytes = 255
ring_buffer_bytes = 524288
pending_operation_max_entries = 4096
stream_state_max_entries = 4096
retention_max_bytes_per_trace = 1048576
redaction_policy = "authorization-header"

[payload.socket]
enabled = false
capture_backend = "bpf-copy-seccomp-fallback"
max_segment_bytes = 4095
max_operation_bytes = 4194304
ring_buffer_bytes = 1048576
pending_operation_max_entries = 4096
stream_state_max_entries = 4096
retention_max_bytes_per_trace = 10485760
redaction_policy = "authorization-header"
http_sniff_max_bytes = 8192
seccomp_syscalls = ["write", "sendto"]

[resource_metrics]
enabled = true
interval_ms = 1000
include_children = true
include_system = true
cpu_alert_percent_millis = "disabled"
memory_alert_rss_kb = "disabled"

[provider]
rules_enabled = true
rules_path = "/tmp/actrail-example-trace-path-retry-provider-rules.conf"
unknown_provider_label = "unknown"
