agent_command = xiaoo
agent_prompt_template = docs/examples/07.xiaoo-claude-agent-invocation/agent_prompt.template
direct_claude_prompt = 你必须使用 Bash 工具执行命令：printf ACTRAIL_AGENT_TREE_OK。然后只输出命令输出，不要解释。
xiaoo_availability_prompt = 请只输出 ACTRAIL_AGENT_TREE_OK，不要解释
claude_extra_args = --tools Bash --allowedTools Bash
claude_timeout_seconds = 90
expected_output_fragment = ACTRAIL_AGENT_TREE_OK
daemon_ready_timeout_seconds = 10
daemon_stop_timeout_seconds = 5
process_stop_timeout_seconds = 5
launch_timeout_seconds = 150
launch_poll_interval_seconds = 1
drain_attempts = 40
drain_sleep_seconds = 1
otel_output_path = /tmp/actrail-xiaoo-claude-agent-invocation.otlp.json
