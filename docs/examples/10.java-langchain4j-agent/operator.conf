# Sparse operator config.
# Missing fields intentionally inherit OperatorDocument defaults.

[control]
socket_path = "/tmp/actrail-java-langchain4j-agent.sock"
pid_file = "/tmp/actrail-java-langchain4j-agent.pid"
log_path = "/tmp/actrail-java-langchain4j-agent.log"

[storage.sqlite]
path = "/tmp/actrail-java-langchain4j-agent.sqlite"

[web]
listen_addr = "127.0.0.1:18095"

[export.snapshot]
directory = "/tmp/actrail-java-langchain4j-agent-export"

[[export.runtime.routes]]
name = "live-otel"
kind = "otel-jsonl"
delivery = "best-effort"
enabled = true

[export.runtime.routes.otel_jsonl]
path = "/tmp/actrail-java-langchain4j-agent-live-spans.otlp.jsonl"
overwrite_enabled = false
queue_capacity = 1024
flush_every_spans = 1

[capture]
profile_name = "java-langchain4j-agent"
capabilities = [
    "proc-lifecycle",
    "proc-exec-context",
    "net-transport",
    "tls-plaintext-payload",
    "net-application-plaintext-http",
    "net-application-http2-frames",
]

[ebpf]
tracked_process_max_entries = 4096
pending_operation_max_entries = 4096
suppressed_fd_max_entries = 4096
event_ring_buffer_max_bytes = 1048576

[payload.tls]
max_operation_bytes = 4194304
ring_buffer_bytes = 1048576
pending_operation_max_entries = 4096
diagnostics_enabled = false
retention_max_bytes_per_trace = 10485760
redaction_policy = "authorization-header"
sync_event_socket_path = "/tmp/actrail-java-langchain4j-agent-tls-sync.sock"
java_agent_enabled = true

[payload.stdio]
enabled = false
capture_stdin = false
ring_buffer_bytes = 1048576
pending_operation_max_entries = 4096
stream_state_max_entries = 4096
retention_max_bytes_per_trace = 10485760
redaction_policy = "authorization-header"

[payload.socket]
enabled = false
ring_buffer_bytes = 2097152
pending_operation_max_entries = 4096
stream_state_max_entries = 4096
retention_max_bytes_per_trace = 10485760
redaction_policy = "authorization-header"
http_sniff_max_bytes = 8192
seccomp_syscalls = [
    "write",
    "sendto",
]

[process_seccomp]
max_args = 64
max_arg_bytes = 4096
pending_max_entries = 4096

[agent_invocation]
enabled = false
commands = ["java"]

[application.http]
sse_enabled = false
sse_data_policy = "disabled"
sse_max_data_bytes = 4096

[application.http2]
max_frame_bytes = 16384
max_connection_buffer_bytes = 1048576
max_data_preview_bytes = 4096

[resource_metrics]
enabled = false

[enforcement]
rules_path = "/tmp/actrail-java-langchain4j-agent-enforcement.conf"
