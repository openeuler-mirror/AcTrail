# Sparse operator config.
# Missing fields intentionally inherit OperatorDocument defaults.

[control]
socket_path = "/tmp/actrail-full-monitor/control.sock"
pid_file = "/tmp/actrail-full-monitor/actraild.pid"
log_path = "/tmp/actrail-full-monitor/actraild.log"

[storage.sqlite]
path = "/tmp/actrail-full-monitor/actrail.sqlite"

[export.snapshot]
directory = "/tmp/actrail-full-monitor/export"

[export.runtime]
enabled = true

[[export.runtime.routes]]
name = "live-otel"
kind = "otel-jsonl"
delivery = "best-effort"
enabled = true

[export.runtime.routes.otel_jsonl]
path = "/tmp/actrail-full-monitor/live-spans.otlp.jsonl"
overwrite_enabled = true
queue_capacity = 1024
flush_every_spans = 1

[capture]
profile_name = "full-monitor"

[payload.tls]
sync_event_socket_path = "/tmp/actrail-full-monitor/tls-sync.sock"

[enforcement]
rules_path = "/tmp/actrail-full-monitor/enforcement-rules.conf"
