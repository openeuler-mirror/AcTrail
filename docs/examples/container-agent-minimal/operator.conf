# Sparse operator config.
# Missing fields intentionally inherit OperatorDocument defaults from
# `actrailctl init`.
#
# Host daemon baseline for container-side:
#   actrailctl probe && actrailctl launch --seccomp-notify auto -- <agent>
#
# The default TLS-sync settings are used as-is. This file only records the
# container deployment differences.

[capture]
profile_name = "container-agent-minimal"
capabilities = [
    "proc-lifecycle",
    "fs-access-basic",
    "fs-mmap",
    "net-transport",
    "ipc-unix-socket",
    "ipc-pipe-fifo",
    "stdio-chunk",
    "tls-plaintext-payload",
    "socket-plaintext-payload",
    "net-application-plaintext-http",
    "net-application-http2-frames",
    "resource-metrics",
]

[export.runtime]
enabled = true

[ebpf]
enabled = "auto"
event_ring_buffer_max_bytes = 8388608

[process_seccomp]
enabled = false
