# AcTrail extended observation workload configuration.
# Used by `ebpf_probe workload` in the manual E2E example.

process_signal_number = 10
exec_path = /bin/cat
listen_addr = 127.0.0.1:0

client_message = actrail-client-e2e
server_message = actrail-server-e2e
stdio_stdin_message = actrail-stdio-stdin-e2e
stdio_continue_message = actrail-stdio-continue-e2e
stdio_stdout_message = actrail-stdio-stdout-e2e
stdio_stderr_message = actrail-stdio-stderr-e2e
pipe_message = actrail-pipe-e2e
file_message = actrail-file-e2e
unix_message = actrail-unix-e2e

fifo_path = /tmp/actrail-extended-observation.fifo
fifo_mode = 600
file_path = /tmp/actrail-extended-observation.file
mkdir_path = /tmp/actrail-extended-observation.mkdir
rmdir_path = /tmp/actrail-extended-observation.rmdir
rename_source_path = /tmp/actrail-extended-observation.rename.src
rename_target_path = /tmp/actrail-extended-observation.rename.dst
unlink_path = /tmp/actrail-extended-observation.unlink
truncate_path = /tmp/actrail-extended-observation.truncate
directory_mode = 700

mmap_enabled = true
mmap_path = /tmp/actrail-extended-observation.mmap
mmap_message = actrail-mmap-e2e
mmap_length = 4096
mmap_offset = 0
