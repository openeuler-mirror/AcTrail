# Sparse operator config.
# Missing fields intentionally inherit OperatorDocument defaults.

[control]
socket_path = "/tmp/actrail-extended-observation.sock"
pid_file = "/tmp/actrail-extended-observation.pid"
log_path = "/tmp/actrail-extended-observation.log"

[storage.sqlite]
path = "/tmp/actrail-extended-observation.sqlite"

[export.snapshot]
directory = "/tmp/actrail-extended-observation-export"
payload_bytes_enabled = false
payload_text_enabled = false

[[export.runtime.routes]]
name = "live-otel"
kind = "otel-jsonl"
delivery = "best-effort"
enabled = true

[export.runtime.routes.otel_jsonl]
path = "/tmp/actrail-live-spans.otlp.jsonl"
overwrite_enabled = false
queue_capacity = 1024
flush_every_spans = 1

[capture]
profile_name = "actrail-extended-e2e"
capabilities = [
    "proc-lifecycle",
    "net-transport",
    "fs-access-basic",
    "fs-mmap",
    "ipc-unix-socket",
    "ipc-pipe-fifo",
    "stdio-chunk",
    "resource-metrics",
]

[ebpf]
tracked_process_max_entries = 4096
pending_operation_max_entries = 4096
suppressed_fd_max_entries = 4096
event_ring_buffer_max_bytes = 524288

[payload.tls]
enabled = false
source = "shared-library"
resolver = "openssl-symbols"
library = "openssl"
max_operation_bytes = 4194304
ring_buffer_bytes = 524288
pending_operation_max_entries = 4096
retention_max_bytes_per_trace = 1048576
redaction_policy = "authorization-header"
sync_event_socket_path = "/tmp/actrail-extended-observation-tls-sync.sock"

[payload.stdio]
max_segment_bytes = 255
ring_buffer_bytes = 524288
pending_operation_max_entries = 4096
stream_state_max_entries = 4096
retention_max_bytes_per_trace = 1048576
redaction_policy = "authorization-header"

[payload.socket]
enabled = false
ring_buffer_bytes = 2097152
pending_operation_max_entries = 4096
stream_state_max_entries = 4096
retention_max_bytes_per_trace = 10485760
redaction_policy = "authorization-header"
http_sniff_max_bytes = 8192
seccomp_syscalls = [
    "write",
    "sendto",
]

[seccomp_notify]
enabled = false

[process_seccomp]
enabled = false
max_args = 64
max_arg_bytes = 4096
pending_max_entries = 4096

[agent_invocation]
enabled = false
commands = [
    "opencode",
    ".opencode",
    "claude",
]

[application]
enabled = false
http1_enabled = false
http2_enabled = false

[application.http]
capture_host = false
sse_enabled = false
sse_data_policy = "disabled"
sse_max_data_bytes = 4096

[application.http2]
max_frame_bytes = 16384
max_connection_buffer_bytes = 1048576
emit_data_preview = false
max_data_preview_bytes = 4096

[provider]
rules_enabled = true
rules_path = "docs/examples/03.extended-observation-e2e/provider-rules.conf"

[enforcement]
rules_path = "/tmp/actrail-enforcement-rules.conf"
