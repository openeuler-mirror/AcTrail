# AcTrail docs example: host daemon config for a restricted workload container
# (no --security-opt seccomp=unconfined, no /sys/kernel mount, no CAP_BPF).
#
# Mount this file read-only at /etc/actrail/actraild.conf on the host and the
# workload container. Pair with:
#   actrailctl probe
#   actrailctl launch --seccomp-mode auto -- <agent>
#
# This is a hierarchical TOML baseline trimmed for the restricted path:
#   [ebpf] enabled = "auto"          — daemon probes eBPF at startup and
#                                       auto-degrades when the host cannot run it
#   [process_seccomp] enabled = false — container ctl relies on tls-sync + host
#                                       eBPF; launch degrades to tls-sync-only
#                                       under Docker's default seccomp profile
#   [capture] capabilities            — only the set the restricted path can
#                                       satisfy (proc-exec-context/fs-*/ipc-*/
#                                       stdio-chunk/resource-metrics dropped)
#   [payload.tls] binary_path = "disabled" — MUST stay disabled under tls-sync
#
# See README.md for the full degradation chain and manual-test-walkthrough.{md,zh.md}
# for step-by-step commands.

[control]
socket_path = "/run/actrail/control.sock"
socket_mode_octal = "660"
pending_connection_max = 256
active_trace_max = 128
pid_file = "/run/actrail/actraild.pid"
log_path = "/var/log/actrail/actraild.log"
diagnostic_log_level = "info"

[control.workload_diagnostics]
enabled = false
interval_ms = 1000

[control.finalization]
traces_per_cycle = 1
poll_interval_ms = 100

[storage]
backend = "sqlite"

[storage.sqlite]
path = "/var/lib/actrail/actrail.sqlite"
busy_timeout_ms = 5000

[web]
listen_addr = "127.0.0.1:18080"
request_read_timeout_ms = "1000"

[export.snapshot]
graph_schema_version = "manual-v1"
allow_active_trace_snapshot = true
directory = "/var/lib/actrail/export"
payload_bytes_enabled = true
payload_text_enabled = true

[export.runtime]
enabled = true

[[export.runtime.routes]]
name = "live-otel"
kind = "otel-jsonl"
delivery = "best-effort"
enabled = true

[export.runtime.routes.otel_jsonl]
path = "/var/lib/actrail/export/live-spans.otlp.jsonl"
overwrite_enabled = true
queue_capacity = 1024
flush_every_spans = 1

[capture]
profile_name = "container-restricted"
capabilities = [
    "proc-lifecycle",
    "net-transport",
    "tls-plaintext-payload",
    "socket-plaintext-payload",
    "net-application-plaintext-http",
    "net-application-http2-frames",
]
opportunistic_capabilities = []
disabled_capabilities = []

[ebpf]
enabled = "auto"
memlock_rlimit = "inherit"
tracked_process_max_entries = 8192
pending_operation_max_entries = 8192
suppressed_fd_max_entries = 8192
suppressed_fd_index_slots_per_process = 64
event_ring_buffer_max_bytes = 8388608
file_path_capture_enabled = true
file_path_max_bytes = 255

[payload.tls]
enabled = true
capture_backend = "tls-sync"
source = "auto"
resolver = "auto"
library = "auto"
library_path = "auto"
binary_path = "disabled"
pattern_path = "disabled"
max_segment_bytes = 4095
max_operation_bytes = 16777216
ring_buffer_bytes = 8388608
pending_operation_max_entries = 8192
seccomp_syscalls = [
    "write",
    "writev",
    "sendto",
    "sendmsg",
]
diagnostics_enabled = true
retention_max_bytes_per_trace = 104857600
redaction_policy = "disabled"
sync_runtime_library_path = "auto"
sync_event_socket_path = "/run/actrail/tls-sync.sock"
sync_socket_mode_octal = "660"
sync_match_limit = 8
sync_flow_control_enabled = true
sync_flow_sniff_bytes = 65536
sync_flow_max_header_bytes = 16384
sync_flow_large_transfer_bytes = 1048576
sync_flow_unknown_stream_bytes = 65536
sync_flow_h2_data_probe_bytes = 65536
java_agent_enabled = false

[payload.stdio]
enabled = true
capture_stdin = true
capture_stdout = true
capture_stderr = true
stdin_storage_mode = "full"
stdout_storage_mode = "drop"
stderr_storage_mode = "metadata-only"
max_segment_bytes = 4095
ring_buffer_bytes = 4194304
pending_operation_max_entries = 8192
stream_state_max_entries = 8192
retention_max_bytes_per_trace = 104857600
redaction_policy = "disabled"

[payload.socket]
enabled = true
capture_backend = "bpf-copy-seccomp-fallback"
max_segment_bytes = 4095
max_operation_bytes = 4194304
ring_buffer_bytes = 8388608
pending_operation_max_entries = 8192
stream_state_max_entries = 8192
retention_max_bytes_per_trace = 104857600
redaction_policy = "disabled"
http_sniff_max_bytes = 65536
seccomp_syscalls = [
    "write",
    "writev",
    "sendto",
    "sendmsg",
]

[seccomp_notify]
enabled = true
reserved_listener_fd = 253

[process_seccomp]
enabled = false
syscalls = [
    "execve",
    "execveat",
    "fork",
    "vfork",
    "clone",
    "clone3",
]
max_args = 128
max_arg_bytes = 8192
pending_max_entries = 8192

[agent_invocation]
enabled = true
commands = []

[semantic_retention]
content_owner = "highest_consumed"

[semantic_retention.l0_llm_call]
enabled = true
request_content = "canonical_blocks"
response_content = "assembled_provider"
tool_calls = "assembled_json"
usage = "summary"

[semantic_retention.l1_sse]
enabled = true
stream_summary = true
event_content = "none"

[semantic_retention.l2_http]
enabled = true
message_summary = true
headers = "metadata"
body_content = "text"

[semantic_retention.l3_http2_frame]
enabled = true
frame_summary = true
data_content = "none"

[semantic_retention.l4_payload]
enabled = true
stats = true
body_content = "none"

[file_observation]
enabled = true
metadata_retention = "compact"

[file_observation.tty]
enabled = true
paths = [
    "/dev/tty",
    "/dev/pts/*",
]
operations = [
    "open",
    "close",
    "read",
    "readv",
    "write",
    "writev",
    "truncate",
]
raw_event_retention = "summary"
summary_flush_interval_ms = 5000

[file_observation.bulk_read]
enabled = true
mode = "path_set"
raw_event_retention = "errors_only"
min_unique_paths = 16
max_paths_per_set = 4096
path_set_chunk_max_paths = 256
pending_event_max = 256

[file_observation.enumerate]
enabled = true
raw_event_retention = "errors_only"
min_unique_paths = 2
max_paths_per_set = 4096
path_set_chunk_max_paths = 256

[application]
enabled = true
http1_enabled = true
http2_enabled = true

[application.http]
capture_host = true
sse_enabled = true
sse_data_policy = "preview"
sse_max_buffer_bytes = 4194304
sse_max_data_bytes = 65536

[application.http2]
max_frame_bytes = 65536
max_connection_buffer_bytes = 4194304
emit_data_preview = true
max_data_preview_bytes = 65536

[resource_metrics]
enabled = true
interval_ms = 1000
include_children = true
include_system = true
cpu_alert_percent_millis = "disabled"
memory_alert_rss_kb = "disabled"

[provider]
rules_enabled = false
rules_path = "/etc/actrail/provider-rules.conf"
unknown_provider_label = "unknown"

[enforcement]
enabled = false
backend = "fanotify"
scope = "trace"
rules_path = "/etc/actrail/enforcement-rules.conf"
default_decision = "allow"
mark_strategy = "parent-directories"
audit_enabled = true
event_buffer_bytes = 65536

[supervision]
startup_wait_ms = 5000
shutdown_wait_ms = 5000
poll_interval_ms = 100
