# Target workload configuration for docs/examples/02.llm-http-payload-capture/http2-local/workload.py.

bind_host = 127.0.0.1
listen_port = 0
listen_backlog = 1
socket_timeout_seconds = 5
child_timeout_seconds = 10
post_workload_hold_seconds = 1
response_delay_seconds = 0.5
post_response_hold_seconds = 0.5
cert_directory = /tmp/actrail-http2-payload-cert
cert_key_algorithm = rsa:2048
cert_subject = /CN=actrail-http2-payload
cert_valid_days = 1
request_path = /v1/chat/completions
request_body = {"model":"actrail-http2","messages":[{"role":"user","content":"payload capture over h2"}],"stream":false}
authorization_header =
response_body = {"ok":true,"source":"actrail-http2"}
