# AcTrail — unified Docker permission auto-selection config.
#
# Sparse operator config. Missing fields intentionally inherit
# OperatorDocument defaults from `actrailctl init`.
#
# Mount read-only at /etc/actrail/container-auto.conf on the host. Pair with:
#   actrailctl probe --host-ebpf auto --seccomp-notify auto
#   actrailctl launch --host-ebpf auto --seccomp-notify auto -- <agent>
#
# Permission-selection properties:
#   [ebpf] enabled = "auto"          — daemon publishes actual collector state.
#   [seccomp_notify] enabled = true  — inherited default; daemon accepts the child listener.
#   [process_seccomp] enabled = true — inherited default; notify-enabled traces capture exec argv.
#   [capture] capabilities           — declares the required capability set;
#                                      derived profiles remove unavailable optional capabilities.
#   [payload.socket] enabled = false — auto initially adds exec context only.
#   [payload.tls] redaction_policy = "authorization-header"
#                                    — production hygiene; "disabled" is for labs.

[export.runtime]
enabled = true

[capture]
profile_name = "container-auto"

# Required: missing any of these rejects trace creation and fails the deploy.
capabilities = [
    "proc-lifecycle",
    "net-transport",
    "tls-plaintext-payload",
    "proc-exec-context",
]

# Captured when available, never fatal if missing. `proc-exec-context` is not
# listed here because argv is part of the seccomp-notify contract.
opportunistic_capabilities = [
    "fs-access-basic",
    "fs-mmap",
    "ipc-unix-socket",
    "ipc-pipe-fifo",
    "stdio-chunk",
    "socket-plaintext-payload",
    "net-application-plaintext-http",
    "net-application-http2-frames",
    "resource-metrics",
]

[ebpf]
enabled = "auto"
event_ring_buffer_max_bytes = 8388608

[payload.tls]
redaction_policy = "authorization-header"

[payload.socket]
enabled = false
